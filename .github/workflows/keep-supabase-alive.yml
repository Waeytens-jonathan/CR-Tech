name: Keep Supabase Alive

on:
  schedule:
    # Tous les 5 jours à 6h00 UTC (7h00 heure de Paris en hiver, 8h00 en été)
    - cron: '0 6 */5 * *'
  workflow_dispatch: # permet aussi de le déclencher manuellement depuis GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        run: |
          curl -s -X GET \
            "https://gzrqkapwjwlwkvwtykfi.supabase.co/rest/v1/rapports?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
